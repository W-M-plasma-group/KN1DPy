[build-system]
requires = ["setuptools>=80.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "KN1DPy"
version = "0.1.0"
requires-python = ">=3.12"

dependencies = [
  "numpy>=2.0",
  "scipy>=1.16.2",
  "netcdf4",
  "matplotlib",
]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[tool.setuptools.packages.find]
where = ["."]
